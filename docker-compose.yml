services:
  vetrelci-stanice:
    build:
      context: .
      dockerfile: Dockerfile
    # Pro produkci z GHCR odkomentuj image a zakomentuj build:
    # image: ghcr.io/elvisek2020/web-space_nothingness:latest
    container_name: vetrelci-stanice
    hostname: vetrelci-stanice
    restart: unless-stopped
    ports:
      - "8080:8000"
    env_file:
      - path: .env
        required: false
    environment:
      PYTHONUNBUFFERED: "1"
      TZ: ${TZ:-Europe/Prague}
      APP_NAME: ${APP_NAME:-Vetřelčí stanice}
      DB_PATH: ${DB_PATH:-/app/data/scores.db}
      SCORE_MAX: ${SCORE_MAX:-1000000}
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
