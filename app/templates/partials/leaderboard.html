<div class="leaderboard-panel">
  {% if scores %}
  <table class="table leaderboard-table">
    <thead>
      <tr>
        <th scope="col">#</th>
        <th scope="col">Posádka</th>
        <th scope="col">Skóre</th>
        <th scope="col">Sekce</th>
      </tr>
    </thead>
    <tbody>
      {% for item in scores %}
      <tr>
        <td>{{ loop.index }}</td>
        <td>{{ item.name }}</td>
        <td>{{ item.score }}</td>
        <td>{{ item.level }}/4</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
  {% else %}
  <p class="empty-state">Zatím žádné záznamy. Stanice čeká na prvního přeživšího.</p>
  {% endif %}
</div>
