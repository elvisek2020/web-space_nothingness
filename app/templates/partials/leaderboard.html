<div class="leaderboard-panel">
  {% if scores %}
  <table class="table leaderboard-table">
    <thead>
      <tr>
        <th scope="col" class="col-rank">#</th>
        <th scope="col" class="col-name">Posádka</th>
        <th scope="col" class="col-score">Skóre</th>
        <th scope="col" class="col-level">Sekce</th>
      </tr>
    </thead>
    <tbody>
      {% for item in scores %}
      <tr>
        <td class="col-rank">{{ loop.index }}</td>
        <td class="col-name" title="{{ item.name }}">{{ item.name }}</td>
        <td class="col-score">{{ item.score }}</td>
        <td class="col-level">{{ item.level }}/9</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
  {% else %}
  <p class="empty-state">Zatím žádné záznamy. Stanice čeká na prvního přeživšího.</p>
  {% endif %}
</div>
